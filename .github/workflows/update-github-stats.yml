name: Update GitHub Stats README + JSON

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update_readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch GitHub Stats (User)
        run: |
          curl -s -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/users/${{ github.repository_owner }} > user.json

      - name: Extract base stats
        run: |
          repos=$(jq '.public_repos' user.json)
          followers=$(jq '.followers' user.json)
          following=$(jq '.following' user.json)

          echo "repos=$repos" >> $GITHUB_ENV
          echo "followers=$followers" >> $GITHUB_ENV
          echo "following=$following" >> $GITHUB_ENV

      - name: Fetch GitHub Stats (Repos)
        run: |
          curl -s -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/users/${{ github.repository_owner }}/repos?per_page=200" > repos.json
      
      - name: Calculate uptime from DOB
        run: |
          # Convert DOB to timestamp
          dob_ts=$(date -d "2000-07-07" +%s)
          now_ts=$(date +%s)

          # Seconds lived
          diff=$((now_ts - dob_ts))

          # Break down to full years, months, days
          years=$((diff / 31556926))
          rem=$((diff % 31556926))
          months=$((rem / 2629743))
          rem=$((rem % 2629743))
          days=$((rem / 86400))

          uptime="${years} years, ${months} months, ${days} days"

          echo "uptime=$uptime" >> $GITHUB_ENV


      - name: Calculate total stars
        run: |
          stars=$(jq '[.[].stargazers_count] | add' repos.json)
          echo "stars=$stars" >> $GITHUB_ENV

      - name: Build compressed JSON
        run: |
          jq -c -n \
            --arg repos "$repos" \
            --arg stars "$stars" \
            --arg followers "$followers" \
            --arg following "$following" \
            '{repos:($repos|tonumber),stars:($stars|tonumber),followers:($followers|tonumber),following:($following|tonumber)}' \
            > github-stats.min.json

      - name: Update README.md
        run: |
          sed -i "s/^Repos      = .*/Repos      = $repos/" README.md
          sed -i "s/^Stars      = .*/Stars      = $stars/" README.md
          sed -i "s/^Followers  = .*/Followers  = $followers/" README.md
          sed -i "s/^Following  = .*/Following  = $following/" README.md
          sed -i "s/^Uptime     = .*/Uptime     = $uptime/" README.md

      - name: Commit changes if any
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md github-stats.min.json
            git commit -m "Update GitHub stats [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
